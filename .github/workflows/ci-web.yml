name: ci-web

on:
  pull_request:
    paths: ["fraccio-web/**"]
  push:
    branches: [main]
    paths: ["fraccio-web/**"]

jobs:
  checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fraccio-web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: fraccio-web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
