name: ci-backend

on:
  pull_request:
    paths: ["fraccio-backend/**"]
  push:
    branches: [main]
    paths: ["fraccio-backend/**"]

jobs:
  checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fraccio-backend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: fraccio-backend/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: fraccio-backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
