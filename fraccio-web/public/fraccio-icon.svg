<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with rounded corners for modern app icon -->
  <rect width="512" height="512" rx="110" fill="#F97316"/>

  <!-- Main House Structure -->
  <g transform="translate(256, 290)">
    <!-- Roof with shadow effect -->
    <path d="M -110 -85 L 0 -175 L 110 -85 Z" fill="#FFFFFF" opacity="0.95"/>
    <path d="M -110 -85 L 0 -175 L 110 -85 L 100 -85 L 0 -150 L -100 -85 Z" fill="#FFFFFF"/>

    <!-- Chimney -->
    <g transform="translate(60, -155)">
      <rect x="-10" y="0" width="20" height="55" fill="#FFFFFF" rx="3"/>
      <rect x="-12" y="-3" width="24" height="8" fill="#FFFFFF" rx="2"/>
      <!-- Smoke -->
      <circle cx="0" cy="-10" r="5" fill="#FFFFFF" opacity="0.4"/>
      <circle cx="-3" cy="-18" r="4" fill="#FFFFFF" opacity="0.3"/>
      <circle cx="3" cy="-25" r="3" fill="#FFFFFF" opacity="0.2"/>
    </g>

    <!-- House Body -->
    <rect x="-100" y="-85" width="200" height="155" fill="#FFFFFF" rx="6"/>

    <!-- Door with frame -->
    <g transform="translate(0, 20)">
      <!-- Door frame -->
      <rect x="-32" y="-20" width="64" height="80" fill="#FFFFFF" rx="5"/>
      <!-- Door -->
      <rect x="-28" y="-16" width="56" height="76" fill="#DC2626" rx="4"/>
      <!-- Door panels -->
      <line x1="0" y1="-16" x2="0" y2="60" stroke="#B91C1C" stroke-width="3"/>
      <line x1="-28" y1="20" x2="28" y2="20" stroke="#B91C1C" stroke-width="3"/>
      <!-- Doorknob -->
      <circle cx="15" cy="30" r="5" fill="#FEF3C7"/>
      <circle cx="15" cy="30" r="3" fill="#FCD34D"/>
    </g>

    <!-- Left Window -->
    <g transform="translate(-55, -40)">
      <!-- Window frame -->
      <rect x="-24" y="-24" width="48" height="48" fill="#FFFFFF" rx="4"/>
      <!-- Window glass -->
      <rect x="-22" y="-22" width="44" height="44" fill="#FED7AA" rx="3"/>
      <!-- Window panes -->
      <line x1="0" y1="-22" x2="0" y2="22" stroke="#F97316" stroke-width="3.5"/>
      <line x1="-22" y1="0" x2="22" y2="0" stroke="#F97316" stroke-width="3.5"/>
      <!-- Window shine -->
      <rect x="-18" y="-18" width="12" height="12" fill="#FFFFFF" opacity="0.4" rx="2"/>
    </g>

    <!-- Right Window -->
    <g transform="translate(55, -40)">
      <!-- Window frame -->
      <rect x="-24" y="-24" width="48" height="48" fill="#FFFFFF" rx="4"/>
      <!-- Window glass -->
      <rect x="-22" y="-22" width="44" height="44" fill="#FED7AA" rx="3"/>
      <!-- Window panes -->
      <line x1="0" y1="-22" x2="0" y2="22" stroke="#F97316" stroke-width="3.5"/>
      <line x1="-22" y1="0" x2="22" y2="0" stroke="#F97316" stroke-width="3.5"/>
      <!-- Window shine -->
      <rect x="-18" y="-18" width="12" height="12" fill="#FFFFFF" opacity="0.4" rx="2"/>
    </g>

    <!-- Garden/Fence -->
    <g transform="translate(0, 85)">
      <!-- Top rail -->
      <rect x="-120" y="0" width="240" height="8" fill="#FFFFFF" rx="3"/>
      <!-- Bottom rail -->
      <rect x="-120" y="15" width="240" height="6" fill="#FFFFFF" opacity="0.8" rx="2"/>
      <!-- Fence posts -->
      <rect x="-110" y="-10" width="7" height="25" fill="#FFFFFF" rx="2"/>
      <rect x="-75" y="-10" width="7" height="25" fill="#FFFFFF" rx="2"/>
      <rect x="-40" y="-10" width="7" height="25" fill="#FFFFFF" rx="2"/>
      <rect x="-5" y="-10" width="7" height="25" fill="#FFFFFF" rx="2"/>
      <rect x="30" y="-10" width="7" height="25" fill="#FFFFFF" rx="2"/>
      <rect x="65" y="-10" width="7" height="25" fill="#FFFFFF" rx="2"/>
      <rect x="100" y="-10" width="7" height="25" fill="#FFFFFF" rx="2"/>
    </g>
  </g>

  <!-- Decorative corner accents -->
  <circle cx="90" cy="110" r="12" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="135" cy="85" r="8" fill="#FFFFFF" opacity="0.12"/>
  <circle cx="422" cy="110" r="12" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="377" cy="85" r="8" fill="#FFFFFF" opacity="0.12"/>

  <!-- Ground shadow -->
  <ellipse cx="256" cy="410" rx="130" ry="15" fill="#000000" opacity="0.15"/>
</svg>
