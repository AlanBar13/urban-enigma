<svg width="800" height="200" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Logo + Wordmark combination for headers/branding -->

  <!-- House Icon (Compact Version) -->
  <g transform="translate(80, 100)">
    <!-- Roof -->
    <path d="M -45 -30 L 0 -65 L 45 -30 Z" fill="#F97316"/>

    <!-- Body -->
    <rect x="-40" y="-30" width="80" height="65" fill="#F97316" rx="3"/>

    <!-- Door -->
    <rect x="-14" y="10" width="28" height="28" fill="#FFFFFF" rx="2"/>

    <!-- Windows -->
    <rect x="-32" y="-15" width="18" height="18" fill="#FFFFFF" rx="1.5"/>
    <rect x="14" y="-15" width="18" height="18" fill="#FFFFFF" rx="1.5"/>

    <!-- Fence -->
    <rect x="-48" y="42" width="96" height="4" fill="#F97316" opacity="0.8" rx="1"/>
  </g>

  <!-- Wordmark "FRACCIO" -->
  <g transform="translate(180, 100)">
    <text x="0" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#1F2937">
      FRACCIO
    </text>
    <text x="2" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="#F97316" letter-spacing="2">
      GESTIÓN DE FRACCIONAMIENTOS
    </text>
  </g>
</svg>
