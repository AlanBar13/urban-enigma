<svg xmlns="http://www.w3.org/2000/svg" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink" width="256" height="256"><svg xmlns="http://www.w3.org/2000/svg" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink" width="256" height="256"><svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Simple version optimized for small sizes (favicon) -->
  <rect width="256" height="256" rx="58" fill="#F97316"></rect>

  <!-- Simplified House -->
  <g transform="translate(128, 140)">
    <!-- Roof -->
    <path d="M -65 -40 L 0 -95 L 65 -40 Z" fill="#FFFFFF"></path>

    <!-- Chimney -->
    <rect x="35" y="-80" width="12" height="30" fill="#FFFFFF" opacity="0.95" rx="2"></rect>

    <!-- Body -->
    <rect x="-60" y="-40" width="120" height="95" fill="#FFFFFF" rx="5"></rect>

    <!-- Door -->
    <rect x="-20" y="20" width="40" height="40" fill="#DC2626" rx="3"></rect>
    <circle cx="10" cy="40" r="3" fill="#FEF3C7"></circle>

    <!-- Left Window -->
    <rect x="-45" y="-18" width="28" height="28" fill="#FED7AA" rx="2"></rect>
    <line x1="-31" y1="-18" x2="-31" y2="10" stroke="#F97316" stroke-width="3"></line>
    <line x1="-45" y1="-4" x2="-17" y2="-4" stroke="#F97316" stroke-width="3"></line>

    <!-- Right Window -->
    <rect x="17" y="-18" width="28" height="28" fill="#FED7AA" rx="2"></rect>
    <line x1="31" y1="-18" x2="31" y2="10" stroke="#F97316" stroke-width="3"></line>
    <line x1="17" y1="-4" x2="45" y2="-4" stroke="#F97316" stroke-width="3"></line>

    <!-- Simple fence -->
    <rect x="-70" y="65" width="140" height="5" fill="#FFFFFF" opacity="0.9" rx="2"></rect>
  </g>

  <!-- Ground shadow -->
  <ellipse cx="128" cy="205" rx="75" ry="8" fill="#000000" opacity="0.12"></ellipse>
</svg></svg><style>@media (prefers-color-scheme: light) { :root { filter: none; } }
@media (prefers-color-scheme: dark) { :root { filter: none; } }
</style></svg>